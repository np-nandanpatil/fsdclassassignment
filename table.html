     <main>
          <section>
              <h1>HTML Tables</h1>
              <table>
                  <caption>Browser Compatibility</caption>
                  <thead>
                      <tr>
                          <th>Browser</th>
                          <th>Support</th>
                      </tr>
                  </thead>
                  <tbody>
                      <tr>
                          <td>Chrome</td>
                          <td>Full</td>
                      </tr>
                      <tr>
                          <td>Firefox</td>
                          <td>Full</td>
                      </tr>
                  </tbody>
                  <tfoot>
                      <tr>
                          <td colspan="2">Data as of 2025</td>
                      </tr>
                  </tfoot>
              </table>
  
              <h2>Complex Tables</h2>
              <table>
                  <caption>HTML Element Support</caption>
                  <thead>
                      <tr>
                          <th rowspan="2">Element</th>
                          <th colspan="2">Support</th>
                      </tr>
                      <tr>
                          <th>Desktop</th>
                          <th>Mobile</th>
                      </tr>
                  </thead>
                  <tbody>
                      <tr>
                          <td>header</td>
                          <td>Yes</td>
                          <td>Yes</td>
                      </tr>
                      <tr>
                          <td>footer</td>
                          <td>Yes</td>
                          <td>Yes</td>
                      </tr>
                  </tbody>
                  <tfoot>
                      <tr>
                          <td colspan="3">Data as of 2025</td>
                      </tr>
                  </tfoot>
              </table>
          </section>
